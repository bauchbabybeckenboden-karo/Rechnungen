<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rechnung – Bauch Baby Beckenboden</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--rose:#9e6b64;--cream:#f7f0ee;--dark:#2c2c2c;--mid:#4a4a4a;--light:#f5ede9}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'EB Garamond',Georgia,serif;background:#e8ddd9;min-height:100vh;padding:20px}
h1{text-align:center;font-size:1.4rem;color:var(--rose);margin-bottom:24px;letter-spacing:1px;font-weight:400}
.container{max-width:700px;margin:0 auto}
.form-card{background:white;padding:26px 30px;margin-bottom:14px;box-shadow:0 2px 12px rgba(158,107,100,0.12)}
.section-title{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--rose);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--cream)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:0.67rem;letter-spacing:1px;text-transform:uppercase;color:var(--rose);margin-bottom:4px}
input,select{width:100%;padding:7px 10px;border:1px solid #ddd;font-family:'EB Garamond',Georgia,serif;font-size:0.9rem;color:var(--dark);background:var(--cream);transition:border-color 0.2s}
input:focus,select:focus{outline:none;border-color:var(--rose)}

/* POSITIONEN TABELLE */
.positionen-header{display:grid;grid-template-columns:3fr 1fr 1.2fr 1.2fr 36px;gap:8px;padding:6px 8px;background:var(--rose);color:white;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.position-row{display:grid;grid-template-columns:3fr 1fr 1.2fr 1.2fr 36px;gap:8px;align-items:center;margin-bottom:6px}
.position-row input{text-align:right}
.position-row input:first-child{text-align:left}
.preis-auto{background:var(--light);border:1px solid var(--rose);padding:7px 10px;font-size:0.9rem;color:var(--rose);font-weight:600;text-align:right}
.btn-remove{width:32px;height:32px;background:none;border:1px solid #ddd;color:#aaa;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.btn-remove:hover{border-color:var(--rose);color:var(--rose)}
.btn-add{width:100%;padding:9px;background:none;border:1px dashed var(--rose);color:var(--rose);cursor:pointer;font-family:'EB Garamond',Georgia,serif;font-size:0.8rem;letter-spacing:1px;text-transform:uppercase;margin-top:6px;transition:all 0.2s}
.btn-add:hover{background:var(--light)}

/* SUMMEN */
.summen-bereich{padding:10px 0 0;border-top:1px solid var(--cream);margin-top:8px}
.summen-zeile{display:flex;justify-content:flex-end;gap:16px;padding:3px 0;font-size:0.9rem}
.summen-zeile.gesamt{border-top:1.5px solid var(--rose);border-bottom:1.5px solid var(--rose);padding:6px 0;margin-top:4px;font-weight:600;font-size:1rem;color:var(--rose)}
.summen-label{color:var(--mid)}
.summen-betrag{min-width:90px;text-align:right;color:var(--dark)}

/* VERLEIH */
.verleih-extra{display:none;margin-top:10px;padding:14px;background:var(--cream);border-left:3px solid var(--rose)}
.verleih-extra.visible{display:block}

/* BUTTONS */
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{flex:1;min-width:130px;padding:12px;border:none;cursor:pointer;font-family:'EB Garamond',Georgia,serif;font-size:0.82rem;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
.btn-primary{background:var(--rose);color:white}
.btn-primary:hover{background:#8a5c55}
.btn-secondary{background:white;color:var(--rose);border:1px solid var(--rose)}
.btn-secondary:hover{background:var(--light)}
.btn-green{background:#5a8a6a;color:white}
.btn-green:hover{background:#4a7a5a}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* STATUS */
.status{display:none;padding:11px 16px;margin-top:10px;font-size:0.85rem}
.status.visible{display:block}
.status.success{background:#eaf4ec;color:#2d6a3f;border-left:3px solid #2d6a3f}
.status.error{background:#fdecea;color:#a32a2a;border-left:3px solid #a32a2a}
.status.loading{background:var(--cream);color:var(--rose);border-left:3px solid var(--rose)}

/* VORSCHAU */
#preview-container{display:none;margin-top:20px}
#preview-container.visible{display:block}
.preview-card{background:white;padding:32px 36px;box-shadow:0 2px 16px rgba(0,0,0,0.15)}
.r-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:8px}
.r-logo{width:80px;height:80px;border-radius:50%;overflow:hidden;flex-shrink:0}
.r-logo img{width:100%;height:100%;object-fit:cover}
.r-title{font-size:2.2rem;font-style:italic;font-weight:400;line-height:1;color:var(--dark)}
.r-subtitle{font-size:0.78rem;color:var(--mid);line-height:1.7;margin-top:6px}
.r-line{border:none;border-top:1px solid var(--rose);margin:10px 0}
.r-addr{min-height:88px;padding:12px 0;font-size:0.9rem;line-height:1.8}
.r-meta{display:flex;justify-content:space-between;margin-bottom:14px;font-size:0.85rem}
.r-meta strong{font-weight:600}
.r-table{width:100%;border-collapse:collapse;font-size:0.88rem}
.r-table thead tr{background:var(--rose);color:white}
.r-table thead th{padding:6px 8px;text-align:left;font-weight:400}
.r-table thead th:nth-child(2),.r-table thead th:nth-child(3),.r-table thead th:nth-child(4){text-align:right}
.r-table tbody tr{background:var(--cream)}
.r-table tbody tr:nth-child(even){background:#efe5e2}
.r-table tbody td{padding:6px 8px}
.r-table tbody td:nth-child(2),.r-table tbody td:nth-child(3),.r-table tbody td:nth-child(4){text-align:right}
.r-sum-row td{padding:3px 8px;text-align:right;font-size:0.85rem}
.r-gesamt-row{border-top:1.5px solid var(--rose);border-bottom:1.5px solid var(--rose)}
.r-gesamt-row td{padding:6px 8px;font-weight:600;font-size:0.95rem;text-align:right}
.r-hinweis{font-size:0.73rem;color:#777;font-style:italic;margin-top:12px}
.r-gruss{margin-top:22px;font-size:0.9rem;line-height:1.8}
.r-unterschrift{font-family:'Pinyon Script',cursive;font-size:2.4rem;color:var(--dark);line-height:1.1;margin:4px 0 2px}
.r-name{font-size:0.82rem;color:var(--mid)}
.r-footer{margin-top:28px;padding-top:8px;border-top:1px solid var(--rose);font-size:0.67rem;color:#666;line-height:1.9}
.ics-btn{margin-top:10px;width:100%;padding:9px;background:#e8ddd9;border:1px dashed var(--rose);color:var(--rose);cursor:pointer;font-family:'EB Garamond',Georgia,serif;font-size:0.8rem;letter-spacing:1px;text-transform:uppercase}
.ics-btn:hover{background:var(--light)}
.nr-row{display:flex;align-items:center;gap:6px}
.nr-label{font-size:0.76rem;color:var(--mid);white-space:nowrap}
</style>
</head>
<body>
<div class="container">
<h1>✦ Rechnung erstellen ✦</h1>

<!-- KUNDENDATEN -->
<div class="form-card">
  <div class="section-title">Kundendaten</div>
  <div class="form-row">
    <div>
      <label>Anrede</label>
      <select id="anrede">
        <option>Frau</option><option>Herr</option><option>Hallo</option>
      </select>
    </div>
    <div>
      <label>Vorname</label>
      <input type="text" id="vorname" placeholder="Vorname">
    </div>
  </div>
  <div class="form-row full">
    <label>Nachname</label>
    <input type="text" id="nachname" placeholder="Nachname">
  </div>
  <div class="form-row full">
    <label>Straße &amp; Hausnummer</label>
    <input type="text" id="strasse" placeholder="Musterstraße 1">
  </div>
  <div class="form-row">
    <div><label>PLZ</label><input type="text" id="plz" placeholder="34121"></div>
    <div><label>Ort</label><input type="text" id="ort" placeholder="Kassel"></div>
  </div>
  <div class="form-row full" style="margin-top:4px">
    <label>E-Mail der Kundin</label>
    <input type="email" id="kunde-email" placeholder="kundin@example.com">
  </div>
</div>

<!-- POSITIONEN -->
<div class="form-card">
  <div class="section-title">Positionen</div>
  <div class="positionen-header">
    <span>Dienstleistung</span>
    <span style="text-align:right">Menge</span>
    <span style="text-align:right">Preis/St.</span>
    <span style="text-align:right">Gesamt</span>
    <span></span>
  </div>
  <div id="positionen-liste"></div>
  <button class="btn-add" onclick="addPosition()">+ Position hinzufügen</button>

  <!-- VERLEIH KALENDER -->
  <div class="verleih-extra" id="verleih-extra">
    <div class="section-title" style="margin-bottom:10px">Kalender – Trageverleih</div>
    <div class="form-row">
      <div><label>Verleih-Start</label><input type="date" id="verleih-start"></div>
      <div>
        <label>Leihdauer</label>
        <select id="leihdauer">
          <option value="1">1 Monat</option>
          <option value="2">2 Monate</option>
          <option value="3">3 Monate</option>
        </select>
      </div>
    </div>
    <button class="ics-btn" onclick="downloadICS()">📅 Kalender-Einträge herunterladen (.ics)</button>
  </div>

  <!-- SUMMEN -->
  <div class="summen-bereich">
    <div class="summen-zeile"><span class="summen-label">Netto</span><span class="summen-betrag" id="summe-netto">0,00 €</span></div>
    <div class="summen-zeile gesamt"><span class="summen-label">Gesamt</span><span class="summen-betrag" id="summe-gesamt">0,00 €</span></div>
  </div>
</div>

<!-- RECHNUNGSINFO -->
<div class="form-card">
  <div class="section-title">Rechnungsdaten</div>
  <div class="form-row three">
    <div>
      <label>Rechnungs-Nr.</label>
      <div class="nr-row">
        <span class="nr-label">BBB-2025-</span>
        <input type="number" id="rechnungsnr" value="1" min="1" style="max-width:55px">
      </div>
    </div>
    <div><label>Datum</label><input type="date" id="datum"></div>
    <div></div>
  </div>
</div>

<!-- BUTTONS -->
<div class="btn-row">
  <button class="btn btn-secondary" onclick="showPreview()">Vorschau</button>
  <button class="btn btn-primary" onclick="drucken()">PDF / Drucken</button>
  <button class="btn btn-green" id="send-btn" onclick="sendEmail()">✉ Per E-Mail senden</button>
</div>
<div class="status" id="status"></div>

<!-- VORSCHAU -->
<div id="preview-container">
  <div class="preview-card" id="rechnung-preview"></div>
</div>
</div>

const DIENSTLEISTUNGEN = Object.keys(PREISLISTE);

document.getElementById('datum').valueAsDate = new Date();
let positionenCount = 0;

// Erste Position beim Laden
addPosition();

function fmt(n){ return n.toFixed(2).replace('.',',') + ' €'; }

function addPosition(){
  const id = ++positionenCount;
  const div = document.createElement('div');
  div.className = 'position-row';
  div.id = 'pos-' + id;

  const opts = DIENSTLEISTUNGEN.map(d =>
    `<option value="${d}">${d}</option>`
  ).join('');

  div.innerHTML = `
    <select onchange="onDLChange(${id})" id="dl-${id}">
      <option value="">– wählen –</option>${opts}
    </select>
    <input type="number" id="menge-${id}" value="1" min="1" oninput="updatePos(${id})" style="text-align:right">
    <div class="preis-auto" id="preis-${id}">–</div>
    <div class="preis-auto" id="gesamt-${id}">–</div>
    <button class="btn-remove" onclick="removePosition(${id})" title="Entfernen">&times;</button>
  `;
  document.getElementById('positionen-liste').appendChild(div);
}

function removePosition(id){
  const el = document.getElementById('pos-' + id);
  if(el) el.remove();
  updateSummen();
  checkVerleih();
}

function onDLChange(id){
  updatePos(id);
  checkVerleih();
}

function updatePos(id){
  const dl = document.getElementById('dl-' + id)?.value;
  const menge = parseFloat(document.getElementById('menge-' + id)?.value) || 1;
  const p = PREISLISTE[dl];
  const preisEl = document.getElementById('preis-' + id);
  const gesamtEl = document.getElementById('gesamt-' + id);
  if(p !== undefined){
    preisEl.textContent = fmt(p);
    gesamtEl.textContent = fmt(p * menge);
  } else {
    preisEl.textContent = '–';
    gesamtEl.textContent = '–';
  }
  updateSummen();
}

function updateSummen(){
  let total = 0;
  document.querySelectorAll('[id^="pos-"]').forEach(row => {
    const id = row.id.replace('pos-','');
    const dl = document.getElementById('dl-' + id)?.value;
    const menge = parseFloat(document.getElementById('menge-' + id)?.value) || 1;
    const p = PREISLISTE[dl];
    if(p !== undefined) total += p * menge;
  });
  document.getElementById('summe-netto').textContent = fmt(total);
  document.getElementById('summe-gesamt').textContent = fmt(total);
}

function checkVerleih(){
  const hasVerleih = [...document.querySelectorAll('[id^="dl-"]')]
    .some(el => el.value === 'Trageverleih (pro Monat)');
  document.getElementById('verleih-extra').classList.toggle('visible', hasVerleih);
  if(hasVerleih && !document.getElementById('verleih-start').value){
    document.getElementById('verleih-start').valueAsDate = new Date();
  }
}

function getPositionen(){
  const rows = [];
  document.querySelectorAll('[id^="pos-"]').forEach(row => {
    const id = row.id.replace('pos-','');
    const dl = document.getElementById('dl-' + id)?.value;
    const menge = parseFloat(document.getElementById('menge-' + id)?.value) || 1;
    const p = PREISLISTE[dl];
    if(dl && p !== undefined){
      rows.push({ dl, menge, p, gesamt: p * menge });
    }
  });
  return rows;
}

function getData(){
  const positionen = getPositionen();
  const total = positionen.reduce((s,r) => s + r.gesamt, 0);
  const nr = String(document.getElementById('rechnungsnr').value).padStart(3,'0');
  const datumRaw = document.getElementById('datum').value;
  const datumFmt = datumRaw ? datumRaw.split('-').reverse().join('.') : '–';
  return {
    anrede: document.getElementById('anrede').value,
    vorname: document.getElementById('vorname').value || 'Vorname',
    nachname: document.getElementById('nachname').value || 'Nachname',
    strasse: document.getElementById('strasse').value || 'Straße',
    plzOrt: (document.getElementById('plz').value||'PLZ')+' '+(document.getElementById('ort').value||'Ort'),
    email: document.getElementById('kunde-email').value,
    positionen, total,
    nr: 'BBB-2025-' + nr,
    datum: 'Kassel, ' + datumFmt,
  };
}

function getRechnungsHTML(d){
  const zeilen = d.positionen.map(r => `
    <tr>
      <td>${r.dl}${r.dl==='Kaution Trageverleih' ? '<br><small style="color:#888;font-style:italic">(wird bei Rückgabe erstattet)</small>' : ''}</td>

      <td style="text-align:right">${fmt(r.p)}</td>
      <td style="text-align:right">${fmt(r.gesamt)}</td>

  return `

  </div>

    <thead><tr>
      <th style="width:50%">Beschreibung</th>

    <tfoot>
      <tr class="r-sum-row"><td colspan="2"></td><td>Netto</td><td>${fmt(d.total)}</td></tr>

function showPreview(){
  const d = getData();
  if(!d.positionen.length){ showStatus('Bitte mindestens eine Dienstleistung auswählen.','error'); return; }
  document.getElementById('rechnung-preview').innerHTML = getRechnungsHTML(d);
  const pc = document.getElementById('preview-container');
  pc.classList.add('visible');
  pc.scrollIntoView({behavior:'smooth'});
}

function drucken(){
  const d = getData();
  if(!d.positionen.length){ showStatus('Bitte mindestens eine Dienstleistung auswählen.','error'); return; }
  const win = window.open('','_blank');

async function sendEmail(){
  const d = getData();
  if(!d.email){ showStatus('Bitte E-Mail-Adresse der Kundin eingeben.','error'); return; }
  if(!d.positionen.length){ showStatus('Bitte mindestens eine Dienstleistung auswählen.','error'); return; }
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  showStatus('E-Mail wird gesendet…','loading');
  try {
    const res = await fetch('/.netlify/functions/send-invoice',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        to: d.email,
        name: d.vorname + ' ' + d.nachname,
        rechnungsNr: d.nr,
        datum: d.datum,
        positionen: d.positionen.map(p => ({
          dl: p.dl, menge: p.menge,
          preis: fmt(p.p), gesamt: fmt(p.gesamt)
        })),
        gesamt: fmt(d.total),
      })
    });
    const json = await res.json();
    if(res.ok){ showStatus('✓ Rechnung erfolgreich an ' + d.email + ' gesendet! Kopie an kontakt@bauch-baby-beckenboden.com','success'); }
    else { showStatus('Fehler: ' + (json.error||'Unbekannt'),'error'); }
  } catch(e){ showStatus('Fehler: ' + e.message,'error'); }
  btn.disabled = false;
}

function showStatus(msg,type){
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status visible ' + type;
}

// ICS
function addMonths(d,n){ const r=new Date(d); r.setMonth(r.getMonth()+n); return r; }
function toICS(d){ return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; }
function icsEvent(uid,sum,desc,start){
  const end=new Date(start.getTime()+3600000);
  return ['BEGIN:VEVENT','UID:'+uid,'SUMMARY:'+sum,'DESCRIPTION:'+desc,
    'DTSTART:'+toICS(start),'DTEND:'+toICS(end),
    'BEGIN:VALARM','TRIGGER:-PT72H','ACTION:DISPLAY','DESCRIPTION:Erinnerung: '+sum,'END:VALARM',
    'END:VEVENT'].join('
');
}
function downloadICS(){
  const startRaw=document.getElementById('verleih-start').value;
  if(!startRaw){ alert('Bitte Startdatum wählen.'); return; }
  const monate=parseInt(document.getElementById('leihdauer').value);
  const name=(document.getElementById('vorname').value+' '+document.getElementById('nachname').value).trim()||'Kundin';
  const start=new Date(startRaw);
  const ende=addMonths(start,monate);
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//BBB//DE','CALSCALE:GREGORIAN',
    icsEvent('start-'+Date.now(),'Trage-Verleih: '+name,'Verliehen an '+name+', '+monate+' Monat(e)',start),
    icsEvent('ende-'+Date.now(),'Trage zurück: '+name,'Rückgabe von '+name,ende),
    'END:VCALENDAR'].join('
');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));
  a.download='Trageverleih_'+name.replace(' ','_')+'.ics';
  a.click();
}
